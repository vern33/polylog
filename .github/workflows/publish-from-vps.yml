name: Publish Dashboard Data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: polylog-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest summary from VPS
        env:
          SUMMARY_URL: ${{ secrets.SUMMARY_URL }}
        run: |
          echo "::add-mask::$SUMMARY_URL"
          test -n "$SUMMARY_URL"
          INDEX_URL="${SUMMARY_URL%/summary.json}/index.html"
          echo "::add-mask::$INDEX_URL"
          if ! curl --fail --silent --show-error --max-time 20 "$INDEX_URL" > /tmp/index.html; then
            echo "index.html was not available at SUMMARY_URL base; keeping checked-in index.html"
          elif grep -q "<html" /tmp/index.html; then
            mv /tmp/index.html index.html
          else
            echo "Fetched index.html did not look like HTML; keeping checked-in index.html"
          fi
          curl --fail --silent --show-error --max-time 20 "$SUMMARY_URL" > summary.json
          grep -q "<html" index.html
          python -m json.tool summary.json > /tmp/summary.json
          mv /tmp/summary.json summary.json

      - name: Commit dashboard data
        run: |
          git config user.name "vern33"
          git config user.email "55816489+vern33@users.noreply.github.com"
          git add index.html summary.json
          if git diff --cached --quiet; then
            echo "No dashboard data changes"
            exit 0
          fi
          git commit -m "Update dashboard data"
          git push
