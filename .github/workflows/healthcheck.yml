name: Public Dashboard Healthcheck

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  healthcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      PAGE_BASE_URL: https://vern33.github.io/polylog
      MAX_SCAN_AGE_SECONDS: "1800"
    steps:
      - name: Check public dashboard
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import UTC, datetime

          base = os.environ["PAGE_BASE_URL"].rstrip("/")
          max_age = int(os.environ["MAX_SCAN_AGE_SECONDS"])

          def fetch(path: str) -> bytes:
              url = f"{base}/{path}"
              req = urllib.request.Request(url, headers={"Cache-Control": "no-cache"})
              with urllib.request.urlopen(req, timeout=25) as resp:
                  if resp.status >= 400:
                      raise RuntimeError(f"{url} returned HTTP {resp.status}")
                  return resp.read()

          index = fetch("index.html").decode("utf-8", errors="replace")
          if "<html" not in index or "Polymarket Strategy Lab" not in index:
              raise RuntimeError("index.html does not look like the expected dashboard")

          summary = json.loads(fetch("summary.json").decode("utf-8"))
          latest = summary.get("latest_scan")
          if not latest:
              raise RuntimeError("summary.json is missing latest_scan")

          latest_dt = datetime.fromisoformat(str(latest).replace("Z", "+00:00"))
          age = int((datetime.now(UTC) - latest_dt).total_seconds())
          if age > max_age:
              raise RuntimeError(f"latest_scan is stale: age={age}s latest_scan={latest}")

          automation = summary.get("automation")
          if not isinstance(automation, dict) or len(automation.get("pipeline", [])) < 7:
              raise RuntimeError("summary.json is missing the automation pipeline")

          print(json.dumps({"ok": True, "latest_scan_age_sec": age}, ensure_ascii=False))
          PY

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          if not token or not chat_id:
              print("Telegram secrets are not configured; skipping notification")
              raise SystemExit(0)
          text = "Polybot Pages healthcheck failed\n" + os.environ["RUN_URL"]
          data = urllib.parse.urlencode({"chat_id": chat_id, "text": text}).encode()
          url = f"https://api.telegram.org/bot{token}/sendMessage"
          req = urllib.request.Request(url, data=data)
          with urllib.request.urlopen(req, timeout=15) as resp:
              print(json.dumps({"telegram_status": resp.status}))
          PY
